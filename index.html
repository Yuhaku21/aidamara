<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Damara AI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
    }


    .app {

      width: 100%;
      max-width: 850px;
      height: 100vh;
      margin: auto;

      display: flex;
      flex-direction: column;

      background: #fff;

    }


    /* HEADER */

    .header {

      padding: 18px 25px;

      display: flex;
      align-items: center;
      gap: 12px;

      background:
        linear-gradient(135deg, #2563eb, #4f46e5);

      color: white;

      box-shadow: 0 4px 15px #0002;

    }


    .avatar-ai {

      width: 45px;
      height: 45px;

      border-radius: 50%;

      background: white;

      display: flex;
      align-items: center;
      justify-content: center;

      color: #2563eb;

      font-size: 22px;
    }


    .header h1 {

      margin: 0;

      font-size: 22px;

    }

    .header span {

      font-size: 13px;
      opacity: .8;

    }


    /* CHAT AREA */


    .chat-box {

      flex: 1;

      overflow-y: auto;

      padding: 25px;

      display: flex;

      flex-direction: column;

      gap: 18px;

    }



    /* EMPTY */

    .empty-state {

      margin: auto;

      color: #94a3b8;

      text-align: center;

    }


    /* MESSAGE */


    .bubble-row {

      display: flex;

      animation: show .3s ease;

    }


    @keyframes show {

      from {

        opacity: 0;
        transform: translateY(15px);

      }

      to {

        opacity: 1;
        transform: translateY(0);

      }

    }


    .user {

      justify-content: flex-end;

    }


    .assistant {

      justify-content: flex-start;

    }



    .message {

      max-width: 75%;

    }



    .label {

      font-size: 12px;

      margin-bottom: 5px;

      color: #64748b;

      font-weight: 600;

    }


    /* bubble */


    .bubble {

      padding: 14px 18px;

      border-radius: 20px;

      line-height: 1.5;

      font-size: 15px;

      box-shadow: 0 4px 12px #0001;

    }


    .bubble.user {

      background:
        linear-gradient(135deg, #2563eb, #1d4ed8);

      color: white;

      border-bottom-right-radius: 5px;

    }



    .bubble.assistant {

      background: #f8fafc;

      border: 1px solid #e2e8f0;

      color: #1e293b;

      border-bottom-left-radius: 5px;

    }


    /* AVATAR */


    .chat-line {

      display: flex;

      gap: 10px;

      align-items: flex-end;

    }


    .small-avatar {

      width: 35px;

      height: 35px;

      border-radius: 50%;

      display: flex;

      justify-content: center;

      align-items: center;

      background: #2563eb;

      color: white;

    }


    /* INPUT */


    .chat-form {

      padding: 15px;

      display: flex;

      gap: 10px;

      border-top: 1px solid #e5e7eb;

      background: white;

    }


    input {

      flex: 1;

      padding: 14px 18px;

      border-radius: 30px;

      border: 1px solid #cbd5e1;

      outline: none;

      font-size: 15px;

    }


    input:focus {

      border-color: #2563eb;

    }


    button {

      padding: 0 25px;

      border: none;

      border-radius: 30px;

      background: #2563eb;

      color: white;

      font-weight: bold;

      cursor: pointer;

      transition: .3s;

    }


    button:hover {

      background: #1d4ed8;

    }


    button:disabled {

      opacity: .6;

    }


    /* TYPING */


    .typing {

      display: flex;

      gap: 5px;

    }


    .dot {

      width: 7px;

      height: 7px;

      background: #64748b;

      border-radius: 50%;

      animation: typing .8s infinite;

    }


    .dot:nth-child(2) {

      animation-delay: .2s;

    }


    .dot:nth-child(3) {

      animation-delay: .4s;

    }



    @keyframes typing {

      50% {

        transform: translateY(-5px);

      }

    }



    /* MOBILE */


    @media(max-width:600px) {

      .bubble {

        max-width: 85%;

      }

      .header h1 {

        font-size: 18px;

      }

    }
  </style>

</head>


<body>


  <main class="app">


    <header class="header">

      <div class="avatar-ai">
        🤖
      </div>

      <div>

        <h1>Damara AI</h1>

        <span>AI Assistant Online</span>

      </div>

    </header>



    <div id="chatBox" class="chat-box">


      <p id="emptyState" class="empty-state">

        Mulai percakapan dengan Damara AI 🚀

      </p>


    </div>




    <form id="chatForm" class="chat-form">


      <input id="chatInput" placeholder="Tulis pesan..." autocomplete="off">


      <button id="sendBtn">

        Kirim

      </button>


    </form>


  </main>

  <script src="script.js"></script>
  <script>


    const form =
      document.getElementById("chatForm");


    const input =
      document.getElementById("chatInput");


    const chatBox =
      document.getElementById("chatBox");


    const button =
      document.getElementById("sendBtn");



    function addMessage(text, type) {


      document.getElementById("emptyState")?.remove();


      let row = document.createElement("div");

      row.className = "bubble-row " + type;


      let avatar = "";


      if (type === "assistant") {

        avatar = `
        <div class="small-avatar">
        🤖
        </div>
        `;

      }


      row.innerHTML = `

    ${type === "assistant" ? avatar : ""}

    <div class="message">

    <div class="label">

    ${type === "user" ? "User" : "Damara AI"}

    </div>

    <div class="bubble ${type}">
    ${text}
    </div>

    </div>

    `;


      chatBox.appendChild(row);


      chatBox.scrollTop =
        chatBox.scrollHeight;


      return row;

    }




    function typingEffect(element, text) {


      let i = 0;


      element.innerHTML = "";


      let interval = setInterval(() => {


        element.innerHTML += text[i];


        i++;


        if (i >= text.length) {

          clearInterval(interval);

        }


      }, 40);



    }





    form.addEventListener("submit", e => {


      e.preventDefault();


      let message = input.value.trim();


      if (!message) return;



      addMessage(message, "user");


      input.value = "";


      button.disabled = true;



      // AI typing container


      let ai =
        addMessage(
          `
<div class="typing">

<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>

</div>
`
          , "assistant");



      let bubble =
        ai.querySelector(".bubble");



      setTimeout(() => {


        bubble.innerHTML = "";


        typingEffect(
          bubble,
          "Terima kasih sudah bertanya. Saya Damara AI siap membantu kamu 🤖"
        );



        button.disabled = false;



      }, 1200);



    });



  </script>


</body>

</html>
